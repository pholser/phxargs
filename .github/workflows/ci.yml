name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake check expect pandoc

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake check expect pandoc

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    name: ${{ matrix.os }} / sanitizers
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake check expect pandoc

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake check expect pandoc

      - name: Configure
        run: cmake -S . -B build-san -DENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build-san

      - name: Test
        run: ctest --test-dir build-san --output-on-failure

  coverage:
    name: coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake check expect pandoc lcov

      - name: Configure
        run: cmake -S . -B build-cov -DENABLE_COVERAGE=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build-cov

      - name: Generate coverage report
        run: cmake --build build-cov --target coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build-cov/coverage/

  static-analysis:
    name: cppcheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake cppcheck

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=OFF

      - name: Run cppcheck
        run: cmake --build build --target cppcheck
